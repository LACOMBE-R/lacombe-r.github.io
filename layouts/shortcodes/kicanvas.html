{{ $src := .Get "src" }}
{{ $src2 := .Get "src2" }}
{{ $controls := .Get "controls" | default "basic" }}

<script type="module" src="https://kicanvas.org/kicanvas/kicanvas.js"></script>

<style>
  kicanvas-embed {
    display: block;
    width: 100%;
    height: 500px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(63,69,81,0.16);
  }
</style>

{{ if $src2 }}
<kicanvas-embed controls="{{ $controls }}">
  <kicanvas-source src="{{ $src }}"></kicanvas-source>
  <kicanvas-source src="{{ $src2 }}"></kicanvas-source>
</kicanvas-embed>
{{ else }}
<kicanvas-embed src="{{ $src }}" controls="{{ $controls }}"></kicanvas-embed>
{{ end }}
