{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "" }}
{{ $src2 := .Get "src2" }}
{{ $alt2 := .Get "alt2" | default "" }}

<style>
  .image2-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  @media (min-width: 768px) {
    .image2-grid {
      flex-direction: row;
    }
    .image2-grid img {
      flex: 1;
      width: 0;
    }
  }
  .image2-grid img {
    object-fit: cover;
    box-shadow: 0 2px 8px rgba(63,69,81,0.16);
  }
</style>

<div class="image2-grid">
  <img src="{{ $src }}" alt="{{ $alt }}">
  <img src="{{ $src2 }}" alt="{{ $alt2 }}">
</div>
