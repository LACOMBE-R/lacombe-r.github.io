{{ $repo := .Get "repo" }}

<a href="https://github.com/{{ $repo }}" target="_blank" rel="noopener" class="gh-card-anchor">
  <img src="https://opengraph.github.com/repo/{{ $repo }}" alt="{{ $repo }}" class="gh-card-img">
</a>

<style>
  .gh-card-anchor {
    display: block;
    max-width: 480px;
    margin: 1.5rem 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #d0d7de;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .gh-card-anchor:hover {
    border-color: #0969da;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .gh-card-img {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
